<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KORBYN</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #000;
    --card: #0a0a0a;
    --text: #fff;
    --text2: #666;
    --border: #1a1a1a;
  }

  [data-theme="light"] {
    --bg: #f0f0f0;
    --card: #fff;
    --text: #000;
    --text2: #555;
    --border: #ddd;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    transition: background 0.4s ease, color 0.4s ease;
  }

  .bg-image {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url('https://github.com/outstrut/elijahpaz.space/blob/main/db5d5ef3-13a4-47a5-ae0c-13aeffb5788b.png?raw=true') center/cover no-repeat;
    filter: grayscale(1) brightness(0.08) blur(2px);
    z-index: 0;
    transition: filter 0.4s ease;
  }

  [data-theme="light"] .bg-image {
    filter: grayscale(1) brightness(0.7) blur(1px);
  }

  .bg-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    z-index: 1;
  }

  [data-theme="light"] .bg-overlay {
    background: rgba(255,255,255,0.6);
  }

  #mainContent {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 2rem;
  }

  .main-title {
    font-size: clamp(5rem, 20vw, 12rem);
    font-weight: 900;
    letter-spacing: -0.04em;
    color: var(--text);
    margin-bottom: 3rem;
    animation: flicker 3s infinite;
  }

  @keyframes flicker {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.8; text-shadow: 0 0 20px rgba(255,255,255,0.1); }
  }

  .discord-btn {
    padding: 1.2rem 4rem;
    font-size: 1.2rem;
    font-weight: 700;
    border: 2px solid var(--text);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-family: 'Courier New', monospace;
    display: inline-block;
    text-decoration: none;
  }

  .discord-btn:hover {
    background: var(--text);
    color: var(--bg);
    transform: scale(1.05);
  }

  .theme-toggle {
    position: fixed;
    top: 24px;
    right: 24px;
    z-index: 50;
    width: 48px;
    height: 48px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    cursor: pointer;
    font-size: 1.4rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    font-family: 'Courier New', monospace;
  }

  .theme-toggle:hover {
    border-color: var(--text);
  }

  #infoPanel {
    position: fixed;
    bottom: 24px;
    left: 24px;
    z-index: 50;
    background: var(--card);
    border: 1px solid var(--border);
    padding: 10px 16px;
    font-family: 'Courier New', monospace;
    font-size: 0.8rem;
    color: var(--text2);
    transition: background 0.3s ease, border-color 0.3s ease, color 0.3s ease;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #infoPanel .label {
    color: var(--text2);
    font-weight: 400;
  }

  #infoPanel .value {
    color: var(--text);
    font-weight: 600;
  }

  #infoPanel .flag {
    width: 24px;
    height: 18px;
    object-fit: cover;
    border: 1px solid var(--border);
    display: inline-block;
  }

  @media (max-width: 600px) {
    .discord-btn {
      padding: 1rem 2.5rem;
      font-size: 1rem;
    }
    #infoPanel {
      font-size: 0.7rem;
      padding: 6px 12px;
      bottom: 12px;
      left: 12px;
      gap: 6px;
    }
    #infoPanel .flag {
      width: 18px;
      height: 14px;
    }
  }
</style>
</head>
<body data-theme="dark">

<div class="bg-image"></div>
<div class="bg-overlay"></div>

<button class="theme-toggle" id="themeToggle">◐</button>

<div id="infoPanel">
  <span class="label">IP:</span>
  <span class="value" id="ipDisplay">Loading...</span>
  <img class="flag" id="flagDisplay" src="" alt="Country flag" style="display:none;">
</div>

<div id="mainContent">
  <div class="main-title">KORBYN</div>
  <a class="discord-btn" href="https://discord.gg/vdSdmYu4B3" target="_blank" rel="noopener noreferrer">Discord Server</a>
</div>

<script>
  // ---- IP DISPLAY WITH FLAG ----
  function updateIP() {
    fetch('https://ipwho.is/')
      .then(res => res.json())
      .then(data => {
        if (data.ip) {
          document.getElementById('ipDisplay').textContent = data.ip;
        }
        if (data.country_code) {
          const flagImg = document.getElementById('flagDisplay');
          flagImg.src = `https://cdn.ipwhois.io/flags/${data.country_code.toLowerCase()}.svg`;
          flagImg.style.display = 'inline-block';
          flagImg.alt = data.country || 'Flag';
        }
      })
      .catch(() => {
        document.getElementById('ipDisplay').textContent = 'Unable to fetch';
      });
  }

  // ---- THEME TOGGLE ----
  const themeToggle = document.getElementById('themeToggle');
  themeToggle.addEventListener('click', () => {
    const current = document.body.getAttribute('data-theme');
    document.body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
  });

  // ---- START ----
  updateIP();
  console.log('KORBYN');
</script>

</body>
</html>
